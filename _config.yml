# --- Site settings -----------------------------------------------------------
title: "Real Repos, Real Ops"
description: >-
  In-depth Kubernetes, Docker, Microservices, Security, System Design, Design
  Patterns, Google Cloud, CI/CD, Domain-Driven Design, Software Architecture,
  Databases, Observability, MLOps, and Generative AI concepts learned from
  actual production repositories — not hello-world YAML.
author: Mayur

# IMPORTANT: set these two to match your GitHub before publishing.
# If your repo is  https://github.com/<username>/<repo>  then:
#   - url      = https://<username>.github.io
#   - baseurl  = /<repo>     (leave EMPTY "" if the repo is named <username>.github.io)
url: "https://mayurjp.github.io"
baseurl: "/dev-blog"

# --- Theme & build -----------------------------------------------------------
markdown: kramdown
highlighter: rouge
permalink: /:categories/:title/

sass:
  sass_dir: _sass
  style: compressed

# GitHub Pages builds with minima 2.5.1 (pinned by the github-pages gem,
# regardless of what Gemfile says), which predates minima's skin: and
# minima.social_links: config keys -- both are silently ignored on 2.5.1.
# The site uses minima's stock (light) styling with no color overrides.
# The GitHub footer icon uses the plain top-level key below, which IS
# supported by minima 2.5.1's _includes/social.html.
github_username: mayurjp
twitter_username: mayurjp
linkedin_username: mayurjp
logo: /assets/logo.svg

# Default image for Open Graph / Twitter Card previews when sharing
# (jekyll-seo-tag uses this as fallback when a post has no image: in front matter)
image: /assets/og/default.png

# Explicit header nav whitelist -- without this, minima lists every page with
# a `title:` (including the topic pages under topics/ and domain pages under qa/).
header_pages:
  - qa.md
  - learn/index.md
  - challenges/index.md
  - about.md
  - work.md
  - archive.md

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Render posts even if their front-matter `date` is later than the build
# clock. Legacy GitHub Pages builds only rebuild on push (no scheduled
# rebuild), so without this, forward-dated posts stay invisible until
# someone pushes again on/after their date.
future: true

# Analytics (set to your Google Analytics measurement ID to enable)
google_analytics: ""  # e.g. G-XXXXXXXXXX

# Google Search Console verification (add the HTML-tag content here)
google_site_verification: ""

# Newsletter (set to your form action URL to enable)
newsletter_action: ""  # e.g. https://formspree.io/f/xxxxx
newsletter_label: "Get new posts in your inbox"

# Comments — Giscus (GitHub Discussions backend)
# Setup: https://giscus.app — enter your repo + category, then paste the values here.
giscus_repo: ""          # e.g. mayurjp/dev-blog
giscus_repo_id: ""       # e.g. R_kgDO...
giscus_category: ""      # e.g. Announcements
giscus_category_id: ""   # e.g. DIC_kwDO...

# --- Housekeeping ------------------------------------------------------------
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - CLAUDE.md
  - vendor
  - fix-excerpts.ps1
  - fix-inline-liquid.py
  - fix-liquid-codeblocks.py
  - fix-qa-links.py
  - lighthouserc.json
  - scripts
  - node_modules
  - package.json
