# --- Site settings -----------------------------------------------------------
title: "Real Repos, Real Ops"
description: >-
  In-depth Kubernetes, Docker, and Microservices concepts learned from actual
  production repositories — not hello-world YAML.
author: Mayur

# IMPORTANT: set these two to match your GitHub before publishing.
# If your repo is  https://github.com/<username>/<repo>  then:
#   - url      = https://<username>.github.io
#   - baseurl  = /<repo>     (leave EMPTY "" if the repo is named <username>.github.io)
url: "https://mayurjp.github.io"
baseurl: "/dev-blog"

# --- Theme & build -----------------------------------------------------------
theme: minima
markdown: kramdown
highlighter: rouge
permalink: /:categories/:title/

minima:
  skin: dark            # options: classic, dark, solarized, solarized-dark, auto
  social_links:
    github: mayurjp

plugins:
  - jekyll-feed
  - jekyll-seo-tag

# --- Housekeeping ------------------------------------------------------------
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor
