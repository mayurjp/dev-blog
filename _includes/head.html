  <!--
    Mermaid loads ONLY on pages that contain ```mermaid code blocks.
    Detected by checking for .language-mermaid in the page body at DOMContentLoaded.
    This avoids a ~1.5MB download on pages without diagrams.
  -->
  <script>
    window.addEventListener("DOMContentLoaded", function () {
      if (!document.querySelector(".language-mermaid")) return;
      var s = document.createElement("script");
      s.src = "https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js";
      s.onload = function () {
        if (typeof mermaid === "undefined") return;
        var matches = document.querySelectorAll(".language-mermaid");
        matches.forEach(function (el) {
          var code = el.tagName === "CODE" ? el : el.querySelector("code");
          if (!code) return;
          var pre = document.createElement("pre");
          pre.className = "mermaid";
          pre.textContent = code.textContent;
          var target = el.closest("div.language-mermaid") || el.closest("pre") || el;
          target.replaceWith(pre);
        });
        var isDark = document.documentElement.getAttribute('data-theme') === 'dark' ||
          (document.documentElement.getAttribute('data-theme') === 'auto' &&
           window.matchMedia('(prefers-color-scheme: dark)').matches);
        mermaid.initialize({
          startOnLoad: false,
          theme: isDark ? 'dark' : 'neutral',
          securityLevel: "loose"
        });
        mermaid.run();
        document.querySelectorAll('.mermaid').forEach(function (svg) {
          if (svg.tagName !== 'svg') return;
          if (!svg.getAttribute('role')) svg.setAttribute('role', 'img');
          var title = svg.querySelector('title');
          if (!title) {
            var t = document.createElementNS('http://www.w3.org/2000/svg', 'title');
            t.textContent = 'Diagram';
            svg.prepend(t);
          }
        });
      };
      document.head.appendChild(s);
    });

    /* Theme toggle: runs before paint to prevent flash */
    (function () {
      var saved = localStorage.getItem('theme');
      var theme = saved || 'auto';
      document.documentElement.setAttribute('data-theme', theme);
    })();

    window.addEventListener("DOMContentLoaded", function () {
      /* Theme toggle button */
      var toggle = document.getElementById('theme-toggle');
      if (toggle) {
        var resolved = document.documentElement.getAttribute('data-theme');
        var isDark = resolved === 'dark' || (resolved === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        toggle.setAttribute('aria-pressed', String(isDark));
        toggle.addEventListener('click', function () {
          var current = document.documentElement.getAttribute('data-theme');
          var next = (current === 'dark') ? 'light' : 'dark';
          document.documentElement.setAttribute('data-theme', next);
          localStorage.setItem('theme', next);
          var nextIsDark = next === 'dark' || (next === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches);
          toggle.setAttribute('aria-pressed', String(nextIsDark));
        });
      }

      /* Reading progress bar */
      var bar = document.createElement("div");
      bar.className = "reading-progress";
      bar.setAttribute("aria-hidden", "true");
      document.body.prepend(bar);
      window.addEventListener("scroll", function () {
        var h = document.documentElement.scrollHeight - window.innerHeight;
        bar.style.width = h > 0 ? (window.scrollY / h * 100) + "%" : "0%";
      }, { passive: true });

      /* Back to top button */
      var btt = document.createElement("button");
      btt.className = "back-to-top";
      btt.textContent = "\u21E7";
      btt.setAttribute("aria-label", "Back to top");
      btt.setAttribute("title", "Back to top");
      document.body.appendChild(btt);
      window.addEventListener("scroll", function () {
        btt.classList.toggle("visible", window.scrollY > 400);
      }, { passive: true });
      btt.addEventListener("click", function () {
        var prefersReduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
        window.scrollTo({ top: 0, behavior: prefersReduced ? "auto" : "smooth" });
      });
    });
  </script>
