<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {%- seo -%}
  <link rel="icon" type="image/svg+xml" href="{{ site.logo | relative_url }}">
  <link rel="stylesheet" href="{{ "/assets/main.css" | relative_url }}">
  {%- feed_meta -%}
  {%- if jekyll.environment == 'production' and site.google_analytics -%}
    {%- include google-analytics.html -%}
  {%- endif -%}
  <script type="module">
    // Kramdown/Rouge has no "mermaid" lexer, so a ```mermaid fenced block
    // just renders as an ordinary highlighted code block:
    //   <div class="language-mermaid highlighter-rouge">
    //     <div class="highlight"><pre class="highlight"><code>...</code></pre></div>
    //   </div>
    // Swap each one for a <pre class="mermaid"> Mermaid actually recognizes,
    // then render. No Jekyll plugin needed — this repo's github-pages gem
    // pin doesn't allow one anyway.
    import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs";

    document.addEventListener("DOMContentLoaded", function () {
      var blocks = document.querySelectorAll(".language-mermaid");
      if (!blocks.length) return;
      blocks.forEach(function (wrapper) {
        var code = wrapper.querySelector("code");
        if (!code) return;
        var pre = document.createElement("pre");
        pre.className = "mermaid";
        pre.textContent = code.textContent;
        wrapper.replaceWith(pre);
      });
      mermaid.initialize({ startOnLoad: false, theme: "neutral", securityLevel: "strict" });
      mermaid.run();
    });
  </script>
</head>
