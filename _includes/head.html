<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {%- seo -%}
  <link rel="icon" type="image/svg+xml" href="{{ site.logo | relative_url }}">
  <link rel="stylesheet" href="{{ "/assets/main.css" | relative_url }}">
  {%- feed_meta -%}
  {%- if jekyll.environment == 'production' and site.google_analytics -%}
    {%- include google-analytics.html -%}
  {%- endif -%}
  <!--
    Rouge has no "mermaid" lexer. For a KNOWN language kramdown/Rouge wraps
    output as <div class="language-X highlighter-rouge"><div class="highlight">
    <pre class="highlight"><code>...spans...</code></pre></div></div>, but for
    an UNRECOGNIZED language it falls back to a bare
    <pre><code class="language-mermaid">escaped text</code></pre> — no
    wrapping div at all (verified against this site's own build output).
    Load Mermaid as a classic global script (not an ES module import) —
    fewer moving parts than dynamic module resolution across a CDN, and the
    de facto standard integration pattern for static sites without a plugin.
    No Jekyll plugin needed here either way — this repo's github-pages gem
    pin doesn't allow one.
  -->
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <script>
    /* Theme toggle: runs before paint to prevent flash */
    (function () {
      var saved = localStorage.getItem('theme');
      var theme = saved || 'auto';
      document.documentElement.setAttribute('data-theme', theme);
    })();

    window.addEventListener("DOMContentLoaded", function () {
      /* Theme toggle button */
      var toggle = document.getElementById('theme-toggle');
      if (toggle) {
        var resolved = document.documentElement.getAttribute('data-theme');
        var isDark = resolved === 'dark' || (resolved === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        toggle.setAttribute('aria-pressed', String(isDark));
        toggle.addEventListener('click', function () {
          var current = document.documentElement.getAttribute('data-theme');
          var next = (current === 'dark') ? 'light' : 'dark';
          document.documentElement.setAttribute('data-theme', next);
          localStorage.setItem('theme', next);
          var nextIsDark = next === 'dark' || (next === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches);
          toggle.setAttribute('aria-pressed', String(nextIsDark));
        });
      }

      /* Mermaid rendering */
      if (typeof mermaid === "undefined") return;
      var matches = document.querySelectorAll(".language-mermaid");
      matches.forEach(function (el) {
        var code = el.tagName === "CODE" ? el : el.querySelector("code");
        if (!code) return;
        var pre = document.createElement("pre");
        pre.className = "mermaid";
        pre.textContent = code.textContent;
        var target = el.closest("div.language-mermaid") || el.closest("pre") || el;
        target.replaceWith(pre);
      });
      if (!matches.length) return;
      var isDark = document.documentElement.getAttribute('data-theme') === 'dark' ||
        (document.documentElement.getAttribute('data-theme') === 'auto' &&
         window.matchMedia('(prefers-color-scheme: dark)').matches);
      mermaid.initialize({
        startOnLoad: false,
        theme: isDark ? 'dark' : 'neutral',
        securityLevel: "loose"
      });
      mermaid.run();
      /* Make mermaid diagrams accessible */
      document.querySelectorAll('.mermaid').forEach(function (svg) {
        if (svg.tagName !== 'svg') return;
        if (!svg.getAttribute('role')) svg.setAttribute('role', 'img');
        var title = svg.querySelector('title');
        if (!title) {
          var t = document.createElementNS('http://www.w3.org/2000/svg', 'title');
          t.textContent = 'Diagram';
          svg.prepend(t);
        }
      });

      /* Reading progress bar */
      var bar = document.createElement("div");
      bar.className = "reading-progress";
      bar.setAttribute("aria-hidden", "true");
      document.body.prepend(bar);
      window.addEventListener("scroll", function () {
        var h = document.documentElement.scrollHeight - window.innerHeight;
        bar.style.width = h > 0 ? (window.scrollY / h * 100) + "%" : "0%";
      }, { passive: true });

      /* Back to top button */
      var btt = document.createElement("button");
      btt.className = "back-to-top";
      btt.textContent = "\u21E7";
      btt.setAttribute("aria-label", "Back to top");
      btt.setAttribute("title", "Back to top");
      document.body.appendChild(btt);
      window.addEventListener("scroll", function () {
        btt.classList.toggle("visible", window.scrollY > 400);
      }, { passive: true });
      btt.addEventListener("click", function () {
        var prefersReduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
        window.scrollTo({ top: 0, behavior: prefersReduced ? "auto" : "smooth" });
      });
    });
  </script>
</head>
